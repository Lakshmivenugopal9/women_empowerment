<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8637A;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#C084A0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9B6BB5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft glow blobs -->
  <circle cx="200" cy="150" r="220" fill="#ffffff" opacity="0.07" filter="url(#blur)"/>
  <circle cx="1050" cy="500" r="260" fill="#ffffff" opacity="0.07" filter="url(#blur)"/>
  <circle cx="700" cy="80" r="160" fill="#ffffff" opacity="0.05" filter="url(#blur)"/>

  <!-- Decorative circles top-right -->
  <circle cx="1100" cy="80" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <circle cx="1100" cy="80" r="80" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="1100" cy="80" r="40" fill="rgba(255,255,255,0.08)"/>

  <!-- Decorative circles bottom-left -->
  <circle cx="100" cy="560" r="100" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="100" cy="560" r="60" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Heart icon -->
  <g transform="translate(140, 200)">
    <circle cx="60" cy="60" r="60" fill="rgba(255,255,255,0.18)"/>
    <path d="M60 82C60 82 34 64 34 46c0-10 8-18 18-18 5 0 9 2 12 5 3-3 7-5 12-5 10 0 18 8 18 18 0 18-34 36-34 36z"
          fill="white" opacity="0.95"/>
  </g>

  <!-- Main title -->
  <text x="260" y="258"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="96"
        font-weight="700"
        fill="white"
        letter-spacing="-2"
        opacity="0.97">HerCare</text>

  <!-- Tagline -->
  <text x="262" y="310"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26"
        font-weight="400"
        fill="rgba(255,255,255,0.82)"
        letter-spacing="4">TRACK. UNDERSTAND. THRIVE.</text>

  <!-- Divider line -->
  <line x1="262" y1="338" x2="780" y2="338" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Description -->
  <text x="262" y="378"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        fill="rgba(255,255,255,0.78)"
        letter-spacing="0.5">A privacy-first women's health tracker — no backend, no login.</text>
  <text x="262" y="410"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        fill="rgba(255,255,255,0.78)"
        letter-spacing="0.5">Built with a single HTML file. Your data stays on your device.</text>

  <!-- Feature pills -->
  <g transform="translate(262, 448)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="rgba(255,255,255,0.18)"/>
    <text x="80" y="26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="500">🌸 Cycle Tracking</text>

    <!-- Pill 2 -->
    <rect x="176" y="0" width="170" height="40" rx="20" fill="rgba(255,255,255,0.18)"/>
    <text x="261" y="26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="500">📋 Symptom Log</text>

    <!-- Pill 3 -->
    <rect x="362" y="0" width="160" height="40" rx="20" fill="rgba(255,255,255,0.18)"/>
    <text x="442" y="26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="500">🌿 Health Plan</text>

    <!-- Pill 4 -->
    <rect x="538" y="0" width="150" height="40" rx="20" fill="rgba(255,255,255,0.18)"/>
    <text x="613" y="26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="white" text-anchor="middle" font-weight="500">🌙 Dark Mode</text>
  </g>

  <!-- Tech badge -->
  <g transform="translate(262, 520)">
    <rect x="0" y="0" width="220" height="38" rx="8" fill="rgba(0,0,0,0.2)"/>
    <text x="110" y="25" font-family="'Courier New', monospace" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">Vanilla HTML · CSS · JS</text>
  </g>

  <!-- Right side mockup card -->
  <g transform="translate(860, 140)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="340" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

    <!-- Mock top bar -->
    <rect x="20" y="20" width="220" height="36" rx="10" fill="rgba(255,255,255,0.12)"/>
    <text x="130" y="44" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle" font-weight="600">Log Entry</text>

    <!-- Mock form fields -->
    <rect x="20" y="72" width="220" height="32" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="36" y="93" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">📅  Today</text>

    <rect x="20" y="116" width="220" height="32" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="36" y="137" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">🌸  Period Day</text>

    <!-- Mood row -->
    <text x="20" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">MOOD</text>
    <text x="20" y="200" font-size="22">😊</text>
    <text x="58" y="200" font-size="22">😐</text>
    <text x="96" y="200" font-size="22">😔</text>
    <text x="134" y="200" font-size="22">😤</text>
    <text x="172" y="200" font-size="22">😰</text>

    <!-- Symptom chips -->
    <text x="20" y="228" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">SYMPTOMS</text>
    <rect x="20" y="236" width="64" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
    <text x="52" y="252" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Cramps</text>
    <rect x="92" y="236" width="64" height="22" rx="11" fill="rgba(255,255,255,0.2)"/>
    <text x="124" y="252" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Fatigue</text>
    <rect x="164" y="236" width="64" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
    <text x="196" y="252" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Acne</text>

    <!-- Save button -->
    <rect x="20" y="278" width="220" height="40" rx="20" fill="rgba(255,255,255,0.25)"/>
    <text x="130" y="304" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">Save Entry</text>
  </g>

</svg>
